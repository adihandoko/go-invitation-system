version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: invitation_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-invitation_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invitation_network

  redis:
    image: redis:7-alpine
    container_name: invitation_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invitation_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invitation_app
    environment:
      APP_NAME: ${APP_NAME:-go-invitation-system}
      APP_PORT: ${APP_PORT:-8080}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-invitation_db}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/root/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - invitation_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: invitation_frontend
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - invitation_network
    restart: unless-stopped

  admin:
    build:
      context: ./admin-coreui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_PUBLIC_SITE_URL: http://localhost:3000
    container_name: invitation_admin
    ports:
      - "3001:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - invitation_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  invitation_network:
    driver: bridge
